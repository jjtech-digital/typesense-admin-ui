<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="106%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#f8fafc"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="720" fill="#0f172a"/>
  <rect x="20" y="18" width="36" height="36" rx="10" fill="#e11d48"/>
  <text x="66" y="42" fill="white" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Typesense Admin</text>

  <!-- Sidebar nav -->
  <text x="48" y="100" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Dashboard</text>
  <rect x="12" y="112" width="196" height="36" rx="8" fill="rgba(255,255,255,0.1)"/>
  <text x="48" y="136" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="500">Analytics</text>
  <text x="48" y="172" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Collections</text>
  <text x="48" y="208" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Synonyms</text>
  <text x="48" y="244" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">API Keys</text>
  <text x="48" y="280" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13">Settings</text>

  <!-- Header -->
  <rect x="220" y="0" width="880" height="56" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="244" y="35" fill="#0f172a" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Analytics</text>
  <rect x="920" y="14" width="28" height="28" rx="6" fill="#f1f5f9"/>

  <!-- Page title -->
  <text x="244" y="90" fill="#111827" font-family="system-ui, sans-serif" font-size="18" font-weight="700">Server Analytics</text>
  <text x="244" y="108" fill="#6b7280" font-family="system-ui, sans-serif" font-size="12">Real-time server metrics, search statistics, and analytics rules</text>

  <!-- Auto-refresh toggle -->
  <rect x="880" y="78" width="16" height="16" rx="3" fill="#e11d48" stroke="#e11d48" stroke-width="1.5"/>
  <polyline points="883,86 887,90 893,82" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <text x="900" y="91" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Auto-refresh (5s)</text>
  <rect x="1000" y="78" width="70" height="26" rx="6" fill="#f1f5f9"/>
  <text x="1015" y="95" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Refresh</text>

  <!-- Overview cards row -->
  <!-- CPU -->
  <rect x="244" y="124" width="130" height="90" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" filter="url(#shadow)"/>
  <text x="256" y="144" fill="#2563eb" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-transform="uppercase" letter-spacing="0.5">CPU USAGE</text>
  <text x="256" y="172" fill="#2563eb" font-family="system-ui, sans-serif" font-size="20" font-weight="700">24.3%</text>
  <text x="256" y="188" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">4 cores</text>
  <rect x="256" y="196" width="106" height="6" rx="3" fill="#dbeafe"/>
  <rect x="256" y="196" width="26" height="6" rx="3" fill="#3b82f6"/>

  <!-- Memory -->
  <rect x="384" y="124" width="130" height="90" rx="10" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" filter="url(#shadow)"/>
  <text x="396" y="144" fill="#9333ea" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">MEMORY</text>
  <text x="396" y="172" fill="#9333ea" font-family="system-ui, sans-serif" font-size="20" font-weight="700">6.2 GB</text>
  <text x="396" y="188" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">of 16 GB</text>
  <rect x="396" y="196" width="106" height="6" rx="3" fill="#f3e8ff"/>
  <rect x="396" y="196" width="41" height="6" rx="3" fill="#a855f7"/>

  <!-- Disk -->
  <rect x="524" y="124" width="130" height="90" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1" filter="url(#shadow)"/>
  <text x="536" y="144" fill="#d97706" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">DISK</text>
  <text x="536" y="172" fill="#d97706" font-family="system-ui, sans-serif" font-size="20" font-weight="700">42.1 GB</text>
  <text x="536" y="188" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">of 100 GB</text>
  <rect x="536" y="196" width="106" height="6" rx="3" fill="#fef3c7"/>
  <rect x="536" y="196" width="45" height="6" rx="3" fill="#f59e0b"/>

  <!-- Network -->
  <rect x="664" y="124" width="130" height="90" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" filter="url(#shadow)"/>
  <text x="676" y="144" fill="#16a34a" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">NETWORK I/O</text>
  <text x="676" y="172" fill="#16a34a" font-family="system-ui, sans-serif" font-size="20" font-weight="700">1.8 GB</text>
  <text x="676" y="188" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">&#8595;1.2 GB &#8593;620 MB</text>

  <!-- Fragmentation -->
  <rect x="804" y="124" width="130" height="90" rx="10" fill="#fff1f2" stroke="#fecdd3" stroke-width="1" filter="url(#shadow)"/>
  <text x="816" y="144" fill="#e11d48" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">FRAGMENTATION</text>
  <text x="816" y="172" fill="#e11d48" font-family="system-ui, sans-serif" font-size="20" font-weight="700">1.042</text>
  <text x="816" y="188" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">memory ratio</text>

  <!-- Write Batches -->
  <rect x="944" y="124" width="126" height="90" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" filter="url(#shadow)"/>
  <text x="956" y="144" fill="#4f46e5" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="0.5">WRITE BATCHES</text>
  <text x="956" y="172" fill="#4f46e5" font-family="system-ui, sans-serif" font-size="20" font-weight="700">0</text>
  <text x="956" y="188" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">pending</text>

  <!-- Search Stats card (left) -->
  <rect x="244" y="230" width="400" height="240" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="256" y="244" width="32" height="32" rx="8" fill="#ecfdf5"/>
  <text x="296" y="260" fill="#111827" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Search Statistics</text>
  <text x="296" y="274" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">Request latencies and throughput per collection</text>
  <line x1="256" y1="290" x2="632" y2="290" stroke="#f3f4f6" stroke-width="1"/>

  <text x="268" y="312" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5">LATENCY (MS)</text>
  <text x="268" y="334" fill="#4b5563" font-family="system-ui, sans-serif" font-size="12">CC-Products-AU</text>
  <text x="580" y="334" fill="#111827" font-family="monospace" font-size="12" font-weight="600" text-anchor="end">12</text>
  <line x1="268" y1="344" x2="620" y2="344" stroke="#f3f4f6" stroke-width="1"/>
  <text x="268" y="362" fill="#4b5563" font-family="system-ui, sans-serif" font-size="12">CC-Products-NZ</text>
  <text x="580" y="362" fill="#111827" font-family="monospace" font-size="12" font-weight="600" text-anchor="end">8</text>
  <line x1="268" y1="372" x2="620" y2="372" stroke="#f3f4f6" stroke-width="1"/>

  <text x="268" y="400" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5">REQUESTS / SECOND</text>
  <text x="268" y="422" fill="#4b5563" font-family="system-ui, sans-serif" font-size="12">CC-Products-AU</text>
  <text x="580" y="422" fill="#111827" font-family="monospace" font-size="12" font-weight="600" text-anchor="end">145</text>
  <line x1="268" y1="432" x2="620" y2="432" stroke="#f3f4f6" stroke-width="1"/>
  <text x="268" y="450" fill="#4b5563" font-family="system-ui, sans-serif" font-size="12">CC-Products-NZ</text>
  <text x="580" y="450" fill="#111827" font-family="monospace" font-size="12" font-weight="600" text-anchor="end">89</text>

  <!-- Analytics Rules card (right) -->
  <rect x="660" y="230" width="410" height="240" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="672" y="244" width="32" height="32" rx="8" fill="#f5f3ff"/>
  <text x="712" y="260" fill="#111827" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Analytics Rules</text>
  <text x="712" y="274" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">Track popular queries and search analytics</text>
  <!-- Create Rule button -->
  <rect x="980" y="246" width="78" height="28" rx="6" fill="#e11d48"/>
  <text x="995" y="264" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="500">+ Create Rule</text>
  <line x1="672" y1="290" x2="1058" y2="290" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Rule item -->
  <rect x="672" y="300" width="28" height="28" rx="7" fill="#f5f3ff"/>
  <text x="710" y="316" fill="#111827" font-family="system-ui, sans-serif" font-size="12" font-weight="600">popular_queries_rule</text>
  <rect x="852" y="304" width="88" height="20" rx="4" fill="#f3f4f6"/>
  <text x="864" y="318" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">popular queries</text>
  <rect x="946" y="304" width="50" height="20" rx="4" fill="#f3f4f6"/>
  <text x="956" y="318" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">search</text>
  <text x="710" y="338" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">CC-Products-AU &#8594; popular_queries</text>
  <line x1="672" y1="352" x2="1058" y2="352" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Rule item 2 -->
  <rect x="672" y="362" width="28" height="28" rx="7" fill="#f5f3ff"/>
  <text x="710" y="378" fill="#111827" font-family="system-ui, sans-serif" font-size="12" font-weight="600">nohits_tracking</text>
  <rect x="835" y="366" width="100" height="20" rx="4" fill="#f3f4f6"/>
  <text x="847" y="380" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">nohits queries</text>
  <rect x="941" y="366" width="50" height="20" rx="4" fill="#f3f4f6"/>
  <text x="951" y="380" fill="#6b7280" font-family="system-ui, sans-serif" font-size="10">search</text>
  <text x="710" y="400" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">CC-Products-AU &#8594; nohits_queries</text>

  <!-- Server Metrics card (full width, bottom) -->
  <rect x="244" y="486" width="826" height="220" rx="12" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <rect x="256" y="500" width="32" height="32" rx="8" fill="#dbeafe"/>
  <text x="296" y="516" fill="#111827" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Server Metrics</text>
  <text x="296" y="530" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">Detailed resource utilization</text>

  <!-- Tabs -->
  <rect x="256" y="544" width="50" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="268" y="562" fill="#2563eb" font-family="system-ui, sans-serif" font-size="11" font-weight="600">CPU</text>
  <text x="320" y="562" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Sys Memory</text>
  <text x="400" y="562" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">TS Memory</text>
  <text x="478" y="562" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Disk</text>
  <text x="520" y="562" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Network</text>
  <line x1="256" y1="578" x2="1058" y2="578" stroke="#f3f4f6" stroke-width="1"/>

  <!-- CPU ring -->
  <circle cx="320" cy="640" r="38" fill="none" stroke="#dbeafe" stroke-width="8"/>
  <circle cx="320" cy="640" r="38" fill="none" stroke="#3b82f6" stroke-width="8" stroke-dasharray="60 180" stroke-linecap="round" transform="rotate(-90 320 640)"/>
  <text x="320" y="644" fill="#111827" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">24.3%</text>

  <text x="380" y="618" fill="#111827" font-family="system-ui, sans-serif" font-size="18" font-weight="700">24.3%</text>
  <text x="380" y="636" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Average CPU usage</text>
  <text x="380" y="652" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10">4 cores detected</text>

  <!-- Per-core bars -->
  <text x="560" y="606" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.5">PER-CORE UTILIZATION</text>
  <text x="560" y="626" fill="#4b5563" font-family="system-ui, sans-serif" font-size="11">Core 1</text>
  <text x="960" y="626" fill="#111827" font-family="monospace" font-size="11" font-weight="600" text-anchor="end">32.1%</text>
  <rect x="560" y="632" width="410" height="6" rx="3" fill="#dbeafe"/>
  <rect x="560" y="632" width="132" height="6" rx="3" fill="#3b82f6"/>

  <text x="560" y="654" fill="#4b5563" font-family="system-ui, sans-serif" font-size="11">Core 2</text>
  <text x="960" y="654" fill="#111827" font-family="monospace" font-size="11" font-weight="600" text-anchor="end">18.5%</text>
  <rect x="560" y="660" width="410" height="6" rx="3" fill="#dbeafe"/>
  <rect x="560" y="660" width="76" height="6" rx="3" fill="#3b82f6"/>

  <text x="560" y="682" fill="#4b5563" font-family="system-ui, sans-serif" font-size="11">Core 3</text>
  <text x="960" y="682" fill="#111827" font-family="monospace" font-size="11" font-weight="600" text-anchor="end">28.7%</text>
  <rect x="560" y="688" width="410" height="6" rx="3" fill="#dbeafe"/>
  <rect x="560" y="688" width="118" height="6" rx="3" fill="#3b82f6"/>
</svg>
