<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="106%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f8fafc"/>

  <!-- Header area -->
  <text x="24" y="30" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11">Collections / products</text>
  <text x="24" y="54" fill="#0f172a" font-family="system-ui, sans-serif" font-size="20" font-weight="600">products</text>

  <!-- Tab bar -->
  <text x="24" y="86" fill="#6b7280" font-family="system-ui, sans-serif" font-size="13">Documents</text>
  <text x="110" y="86" fill="#e11d48" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Schema</text>
  <rect x="110" y="92" width="56" height="2" rx="1" fill="#e11d48"/>

  <!-- Schema card -->
  <rect x="24" y="108" width="852" height="460" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

  <!-- Card header -->
  <text x="48" y="140" fill="#0f172a" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Schema Fields</text>
  <rect x="740" y="122" width="112" height="32" rx="8" fill="#e11d48"/>
  <text x="762" y="143" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="500">+ Add Field</text>

  <!-- Table header -->
  <rect x="48" y="160" width="804" height="32" rx="0" fill="#f9fafb"/>
  <text x="64" y="181" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11" font-weight="600">FIELD NAME</text>
  <text x="580" y="181" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end">TYPE</text>
  <text x="830" y="181" fill="#6b7280" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="end">PROPERTIES</text>

  <!-- Row 1: id -->
  <rect x="48" y="192" width="804" height="40" rx="0" fill="white"/>
  <line x1="48" y1="232" x2="852" y2="232" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="217" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">id</text>
  <rect x="540" y="204" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="219" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>

  <!-- Row 2: title -->
  <rect x="48" y="232" width="804" height="40" rx="0" fill="#fafafa"/>
  <line x1="48" y1="272" x2="852" y2="272" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="257" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">title</text>
  <rect x="540" y="244" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="259" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>
  <rect x="750" y="244" width="36" height="22" rx="4" fill="#fef3c7"/>
  <text x="756" y="259" fill="#92400e" font-family="system-ui, sans-serif" font-size="10">sort</text>
  <rect x="700" y="244" width="42" height="22" rx="4" fill="#d1fae5"/>
  <text x="706" y="259" fill="#065f46" font-family="system-ui, sans-serif" font-size="10">index</text>

  <!-- Row 3: description -->
  <rect x="48" y="272" width="804" height="40" rx="0" fill="white"/>
  <line x1="48" y1="312" x2="852" y2="312" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="297" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">description</text>
  <rect x="540" y="284" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="299" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>
  <rect x="700" y="284" width="42" height="22" rx="4" fill="#d1fae5"/>
  <text x="706" y="299" fill="#065f46" font-family="system-ui, sans-serif" font-size="10">index</text>

