  <text x="549" y="339" fill="#9d174d" font-family="system-ui, sans-serif" font-size="11">float</text>
  <rect x="700" y="324" width="42" height="22" rx="4" fill="#ede9fe"/>
  <text x="706" y="339" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="10">facet</text>
  <rect x="750" y="324" width="36" height="22" rx="4" fill="#fef3c7"/>
  <text x="756" y="339" fill="#92400e" font-family="system-ui, sans-serif" font-size="10">sort</text>
  <rect x="794" y="324" width="56" height="22" rx="4" fill="#ffedd5"/>
  <text x="800" y="339" fill="#9a3412" font-family="system-ui, sans-serif" font-size="10">optional</text>

  <!-- Row 5: brand -->
  <rect x="48" y="352" width="804" height="40" rx="0" fill="white"/>
  <line x1="48" y1="392" x2="852" y2="392" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="377" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">brand</text>
  <rect x="540" y="364" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="379" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>
  <rect x="700" y="364" width="42" height="22" rx="4" fill="#ede9fe"/>
  <text x="706" y="379" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="10">facet</text>
  <rect x="750" y="364" width="42" height="22" rx="4" fill="#d1fae5"/>
  <text x="756" y="379" fill="#065f46" font-family="system-ui, sans-serif" font-size="10">index</text>

  <!-- Row 6: color -->
  <rect x="48" y="392" width="804" height="40" rx="0" fill="#fafafa"/>
  <line x1="48" y1="432" x2="852" y2="432" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="417" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">color</text>
  <rect x="540" y="404" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="419" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>
  <rect x="700" y="404" width="42" height="22" rx="4" fill="#ede9fe"/>
  <text x="706" y="419" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="10">facet</text>

  <!-- Row 7: image_link -->
  <rect x="48" y="432" width="804" height="40" rx="0" fill="white"/>
  <line x1="48" y1="472" x2="852" y2="472" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="457" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">image_link</text>
  <rect x="540" y="444" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="459" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>

  <!-- Row 8: availability -->
  <rect x="48" y="472" width="804" height="40" rx="0" fill="#fafafa"/>
  <line x1="48" y1="512" x2="852" y2="512" stroke="#f1f5f9" stroke-width="1"/>
  <text x="64" y="497" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">availability</text>
  <rect x="540" y="484" width="52" height="22" rx="4" fill="#dbeafe"/>
  <text x="550" y="499" fill="#1d4ed8" font-family="system-ui, sans-serif" font-size="11">string</text>
  <rect x="700" y="484" width="42" height="22" rx="4" fill="#ede9fe"/>
  <text x="706" y="499" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="10">facet</text>
  <rect x="750" y="484" width="36" height="22" rx="4" fill="#fef3c7"/>
  <text x="756" y="499" fill="#92400e" font-family="system-ui, sans-serif" font-size="10">sort</text>

  <!-- Row 9: rating -->
  <rect x="48" y="512" width="804" height="40" rx="0" fill="white"/>
  <text x="64" y="537" fill="#0f172a" font-family="monospace" font-size="13" font-weight="500">rating</text>
  <rect x="540" y="524" width="42" height="22" rx="4" fill="#fce7f3"/>
  <text x="549" y="539" fill="#9d174d" font-family="system-ui, sans-serif" font-size="11">float</text>
  <rect x="700" y="524" width="42" height="22" rx="4" fill="#ede9fe"/>
  <text x="706" y="539" fill="#5b21b6" font-family="system-ui, sans-serif" font-size="10">facet</text>
  <rect x="750" y="524" width="36" height="22" rx="4" fill="#fef3c7"/>
  <text x="756" y="539" fill="#92400e" font-family="system-ui, sans-serif" font-size="10">sort</text>
  <rect x="794" y="524" width="56" height="22" rx="4" fill="#ffedd5"/>
  <text x="800" y="539" fill="#9a3412" font-family="system-ui, sans-serif" font-size="10">optional</text>
